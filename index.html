<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="一个可部署到 GitHub Pages 的 3D 撞车模拟器网页游戏。"
    />
    <title>撞车模拟器</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="shell" aria-label="撞车模拟器游戏">
      <section class="stage" aria-label="游戏画面">
        <canvas id="game" width="1280" height="720"></canvas>

        <div id="start-screen" class="overlay">
          <div class="modal">
            <p class="eyebrow">Crash City</p>
            <h1>撞车模拟器</h1>
            <p class="intro">
              驾驶测试车穿过城市街区，撞开其它汽车、制造连击，并尽量别把车彻底撞报废。
            </p>
            <div class="controls">
              <span>WASD / 方向键驾驶</span>
              <span>空格刹车</span>
              <span>C 切换视角</span>
              <span>P 暂停</span>
              <span>M 声音开关</span>
              <span>F 全屏</span>
            </div>
            <div class="vehicle-picker" aria-label="选择车辆">
              <button class="vehicle-option active" type="button" data-vehicle="sport">
                运动轿车
              </button>
              <button class="vehicle-option" type="button" data-vehicle="suv">SUV</button>
              <button class="vehicle-option" type="button" data-vehicle="pickup">皮卡</button>
              <button class="vehicle-option" type="button" data-vehicle="police">警用车</button>
            </div>
            <button id="start-btn" class="primary" type="button">开始测试</button>
          </div>
        </div>

        <div id="game-over" class="overlay hidden">
          <div class="modal compact">
            <p class="eyebrow">Test Complete</p>
            <h2 id="result-title">测试结束</h2>
            <p id="result-copy" class="intro"></p>
            <button id="restart-btn" class="primary" type="button">重新开始</button>
          </div>
        </div>
      </section>
    </main>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.164.1/build/three.module.js"
        }
      }
    </script>
    <script type="module" src="game.js?v=20260502-city-grid"></script>
  </body>
</html>
